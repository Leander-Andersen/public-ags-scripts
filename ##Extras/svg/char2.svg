<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 360">
  <defs>
    <style>
      .sk { fill: #fde8f0; }
      .hr { fill: #9c27b0; }
      .dr { fill: #e1bee7; }
      .ac { fill: #e91e8c; }
      .dk { fill: #1a0030; }
      .wh { fill: #fff; }
    </style>
  </defs>

  <!-- side hair / behind head -->
  <path d="M28 118 C22 154 20 212 26 254 C30 274 44 272 48 254 C52 224 48 162 64 142" class="hr"/>
  <path d="M132 118 C138 154 140 212 134 254 C130 274 116 272 112 254 C108 224 112 162 96 142" class="hr"/>

  <!-- hair top -->
  <ellipse cx="80" cy="60" rx="52" ry="44" class="hr"/>

  <!-- big bow -->
  <path d="M34 44 C20 28 14 44 32 52 L60 46Z" class="ac"/>
  <path d="M126 44 C140 28 146 44 128 52 L100 46Z" class="ac"/>
  <circle cx="80" cy="48" r="9" class="ac"/>

  <!-- head -->
  <ellipse cx="80" cy="92" rx="45" ry="48" class="sk"/>

  <!-- hair fringe -->
  <path d="M35 82 C40 55 60 40 80 38 C100 40 120 55 125 82 C111 64 97 58 80 57 C63 58 49 64 35 82Z" class="hr"/>

  <!-- eyes (big) -->
  <ellipse cx="64" cy="95" rx="11" ry="13" class="dk"/>
  <ellipse cx="96" cy="95" rx="11" ry="13" class="dk"/>
  <ellipse cx="60" cy="90" rx="4" ry="4" class="wh"/>
  <ellipse cx="92" cy="90" rx="4" ry="4" class="wh"/>
  <circle cx="67" cy="99" r="2" class="wh" opacity="0.7"/>
  <circle cx="99" cy="99" r="2" class="wh" opacity="0.7"/>

  <!-- eyebrows -->
  <path d="M54 80 Q63 75 71 79" stroke="#9c27b0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M89 79 Q97 75 106 80" stroke="#9c27b0" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- blush -->
  <ellipse cx="51" cy="108" rx="10" ry="5" fill="#ffb3d9" opacity="0.5"/>
  <ellipse cx="109" cy="108" rx="10" ry="5" fill="#ffb3d9" opacity="0.5"/>

  <!-- mouth smile -->
  <path d="M73 120 Q80 127 87 120" stroke="#c2185b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="72" y="137" width="16" height="16" rx="7" class="sk"/>

  <!-- dress body -->
  <path d="M38 152 C30 182 28 232 30 262 L130 262 C132 232 130 182 122 152 C110 144 96 140 80 140 C64 140 50 144 38 152Z" class="dr"/>

  <!-- dress collar overlay -->
  <path d="M60 152 L80 170 L100 152 C92 146 80 143 80 143 C80 143 68 146 60 152Z" fill="#f3e5f5"/>

  <!-- little bow on collar -->
  <path d="M74 160 C68 152 62 160 70 164 L78 160Z" class="ac"/>
  <path d="M86 160 C92 152 98 160 90 164 L82 160Z" class="ac"/>
  <circle cx="80" cy="162" r="4" class="ac"/>

  <!-- left arm -->
  <path d="M38 156 C24 164 14 198 18 228 C20 239 30 240 34 228 C38 208 38 184 52 172" class="sk"/>
  <!-- right arm -->
  <path d="M122 156 C136 164 146 198 142 228 C140 239 130 240 126 228 C122 208 122 184 108 172" class="sk"/>

  <!-- hands -->
  <ellipse cx="16" cy="234" rx="12" ry="10" class="sk"/>
  <ellipse cx="144" cy="234" rx="12" ry="10" class="sk"/>

  <!-- skirt flare -->
  <path d="M26 258 C20 275 18 292 22 302 L138 302 C142 292 140 275 134 258Z" fill="#ce93d8"/>

  <!-- scalloped skirt hem -->
  <path d="M20 298 C30 310 44 307 56 298 C68 310 80 312 80 298 C80 312 92 310 104 298 C116 310 130 307 140 298"
        stroke="#e1bee7" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- legs -->
  <rect x="52" y="300" width="20" height="46" rx="10" class="sk"/>
  <rect x="88" y="300" width="20" height="46" rx="10" class="sk"/>

  <!-- shoes -->
  <ellipse cx="62" cy="346" rx="18" ry="9" fill="#7b1fa2"/>
  <ellipse cx="98" cy="346" rx="18" ry="9" fill="#7b1fa2"/>

  <!-- shoe bows -->
  <path d="M56 342 C51 335 47 342 54 345Z" class="ac"/>
  <path d="M68 342 C73 335 77 342 70 345Z" class="ac"/>
  <path d="M92 342 C87 335 83 342 90 345Z" class="ac"/>
  <path d="M104 342 C109 335 113 342 106 345Z" class="ac"/>
</svg>
