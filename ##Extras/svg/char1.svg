<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 360">
  <defs>
    <style>
      .sk { fill: #fde8f0; }
      .hr { fill: #f06292; }
      .dr { fill: #f8bbd0; }
      .ac { fill: #e91e8c; }
      .dk { fill: #4a0030; }
      .wh { fill: #fff; }
      .bl { fill: #ffb3d9; }
    </style>
  </defs>

  <!-- twintails -->
  <path d="M42 108 C16 124 6 182 14 250 C18 270 32 268 36 250 C40 222 38 166 58 142" class="hr"/>
  <path d="M118 108 C144 124 154 182 146 250 C142 270 128 268 124 250 C120 222 122 166 102 142" class="hr"/>

  <!-- hair top -->
  <ellipse cx="80" cy="56" rx="50" ry="42" class="hr"/>

  <!-- head -->
  <ellipse cx="80" cy="90" rx="45" ry="49" class="sk"/>

  <!-- hair fringe -->
  <path d="M35 78 C40 52 60 37 80 35 C100 37 120 52 125 78 C112 60 97 54 80 53 C63 54 48 60 35 78Z" class="hr"/>

  <!-- ahoge -->
  <path d="M80 14 C85 2 95 0 91 17 C89 23 81 27 79 34" stroke="#f06292" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- twintail bands -->
  <circle cx="42" cy="110" r="8" class="ac"/>
  <circle cx="118" cy="110" r="8" class="ac"/>

  <!-- eyes -->
  <ellipse cx="64" cy="93" rx="9" ry="11" class="dk"/>
  <ellipse cx="96" cy="93" rx="9" ry="11" class="dk"/>
  <circle cx="61" cy="89" r="3" class="wh"/>
  <circle cx="93" cy="89" r="3" class="wh"/>
  <circle cx="67" cy="97" r="1.5" class="wh" opacity="0.7"/>
  <circle cx="99" cy="97" r="1.5" class="wh" opacity="0.7"/>

  <!-- blush -->
  <ellipse cx="50" cy="104" rx="10" ry="5" class="bl" opacity="0.5"/>
  <ellipse cx="110" cy="104" rx="10" ry="5" class="bl" opacity="0.5"/>

  <!-- mouth -->
  <path d="M73 117 Q80 124 87 117" stroke="#e91e8c" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- neck -->
  <rect x="72" y="135" width="16" height="16" rx="7" class="sk"/>

  <!-- dress body -->
  <path d="M36 150 C28 180 26 230 28 260 L132 260 C134 230 132 180 124 150 C112 142 96 138 80 138 C64 138 48 142 36 150Z" class="dr"/>

  <!-- dress bow -->
  <path d="M68 158 C58 148 52 158 62 163 L72 158Z" class="ac"/>
  <path d="M92 158 C102 148 108 158 98 163 L88 158Z" class="ac"/>
  <circle cx="80" cy="160" r="5" class="ac"/>

  <!-- left arm -->
  <path d="M36 154 C22 162 12 196 16 226 C18 237 28 238 32 226 C36 206 36 182 50 170" class="sk"/>
  <!-- right arm -->
  <path d="M124 154 C138 162 148 196 144 226 C142 237 132 238 128 226 C124 206 124 182 110 170" class="sk"/>

  <!-- hands -->
  <ellipse cx="14" cy="232" rx="12" ry="10" class="sk"/>
  <ellipse cx="146" cy="232" rx="12" ry="10" class="sk"/>

  <!-- skirt flare -->
  <path d="M24 256 C18 272 16 290 20 300 L140 300 C144 290 142 272 136 256Z" fill="#f48fb1"/>

  <!-- legs -->
  <rect x="52" y="298" width="20" height="48" rx="10" class="sk"/>
  <rect x="88" y="298" width="20" height="48" rx="10" class="sk"/>

  <!-- shoes -->
  <ellipse cx="62" cy="346" rx="18" ry="9" fill="#c2185b"/>
  <ellipse cx="98" cy="346" rx="18" ry="9" fill="#c2185b"/>
</svg>
