# This workflow will triage pull requests and apply a label based on the
# paths that are modified in the pull request.
#
# To use this workflow, you will need to set up a .github/labeler.yml
# file with configuration.  For more information, see:
# https://github.com/actions/labeler

name: Labeler
on: [pull_request_target]

jobs:
  label:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
    # Pinned to a commit SHA (not a moving major tag) so a compromise of
    # the labeler repo can't silently swap our pinned action. The trailing
    # comment is the human-readable version this SHA corresponds to.
    # NOTE: this workflow uses pull_request_target — DO NOT add a checkout
    # step that fetches PR code, or the GITHUB_TOKEN ends up in PR-author
    # hands.
    - uses: actions/labeler@ac9175f8a1f3625fd0d4fb234536d26811351594 # v4
      with:
        repo-token: "${{ secrets.GITHUB_TOKEN }}"
