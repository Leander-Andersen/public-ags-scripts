name: Credential scan

on:
  push:
    branches: [ "main", "experimental", "feature/**" ]
  pull_request:
    branches: [ "main", "experimental" ]

jobs:
  gitleaks:
    name: Detect leaked secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks can scan all commits on the branch

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smtp-block-check:
    name: No embedded SMTP credentials
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for populated SMTP credential blocks
        run: |
          # Fail if any .ps1 file has a non-empty _SmtpServer value — this indicates
          # a packaged script with embedded credentials was accidentally committed.
          FOUND=$(grep -rn "^\\\$Script:_SmtpServer = '[^']" --include="*.ps1" . || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Embedded SMTP credentials detected in a committed .ps1 file."
            echo "::error::Run Invoke-PackageSmtp on your own machine and distribute the _pkg.ps1 locally — never commit it."
            echo "$FOUND"
            exit 1
          fi
          echo "No embedded SMTP credentials found."
