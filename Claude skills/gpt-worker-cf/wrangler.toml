name = "gpt-worker-mcp"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Remove the Durable Object class from the previous deployment
[[migrations]]
tag = "v2"
deleted_classes = ["GptWorkerMCP"]

[vars]
GPT_MODEL = "gpt-5.4"
CHUNK_SIZE = "4000"
MAX_PARALLEL_REQUESTS = "5"

# OPENAI_API_KEY must be set as a secret in the Cloudflare dashboard:
#   Worker → Settings → Variables and Secrets → Add Secret
